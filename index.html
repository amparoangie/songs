<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>amparo</title>

<style>

/* ---------- DESIGN VARIABLES ---------- */

:root{
--bg:#f5f5f7;
--card:#ffffff;
--text:#1d1d1f;
--secondary:#6e6e73;
--border:#d2d2d7;
--accent:#ff3b30;
}

body.dark{
--bg:#1c1c1e;
--card:#2c2c2e;
--text:#f5f5f7;
--secondary:#a1a1a6;
--border:#3a3a3c;
--accent:#ff453a;
}

/* ---------- BODY ---------- */

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--text);
margin:0;
padding:40px 20px;
display:flex;
justify-content:center;
text-transform:lowercase;
transition:background .3s,color .3s;
}

/* ---------- MAIN CARD ---------- */

.app{
width:100%;
max-width:420px;
background:var(--card);
padding:36px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
}

/* ---------- TITLE ---------- */

h1{
font-weight:500;
font-size:26px;
margin-bottom:30px;
}

/* ---------- INPUT SECTIONS ---------- */

.section{
margin-bottom:22px;
}

label{
display:block;
font-size:13px;
color:var(--secondary);
margin-bottom:6px;
}

select,
input[type=file]{
width:100%;
padding:8px 10px;
border-radius:10px;
border:1px solid var(--border);
background:transparent;
font-size:13px;
font-family:inherit;
}

/* ---------- BUTTONS ---------- */

.buttons{
margin-top:12px;
}

button{
padding:7px 14px;
border-radius:12px;
border:1px solid var(--border);
background:transparent;
font-family:inherit;
font-size:13px;
cursor:pointer;
margin:4px;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 2px 6px rgba(0,0,0,.15);
}

/* ---------- SONG DISPLAY ---------- */

#songDisplay{
font-size:24px;
margin-top:25px;
}

#countdown{
font-size:64px;
color:var(--accent);
margin-top:6px;
}

/* ---------- SESSION TIMER ---------- */

#sessionTimer{
font-size:14px;
color:var(--secondary);
margin-top:10px;
}

/* ---------- AUDIO ---------- */

audio{
margin-top:18px;
width:100%;
}

/* ---------- PROGRESS BAR ---------- */

#songProgressContainer{
width:100%;
height:6px;
background:var(--border);
border-radius:3px;
margin-top:10px;
overflow:hidden;
}

#songProgress{
height:100%;
width:0%;
background:var(--accent);
}

/* ---------- SETLIST ---------- */

#setlist{
margin-top:20px;
font-size:13px;
text-align:left;
border:1px solid var(--border);
border-radius:12px;
padding:10px;
max-height:180px;
overflow:auto;
display:none;
}

/* ---------- LOADER ---------- */

.loader{
border:5px solid var(--border);
border-top:5px solid var(--accent);
border-radius:50%;
width:32px;
height:32px;
margin:18px auto;
animation:spin 1s linear infinite;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* ---------- DARK MODE BUTTON ---------- */

#darkToggle{
position:fixed;
top:14px;
left:14px;
border:none;
background:transparent;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<button id="darkToggle" onclick="toggleDark()">☀️</button>

<div class="app">

<h1>amparo</h1>

<div class="section">
<label>practice time</label>
<select id="timeSelect">
<option value="60">1 hour</option>
<option value="120">2 hours</option>
<option value="180">3 hours</option>
</select>
</div>

<div class="section">
<label>countdown</label>
<select id="countdownSelect">
<option value="3">3 seconds</option>
<option value="5" selected>5 seconds</option>
<option value="10">10 seconds</option>
</select>
</div>

<div class="section">
<label>upload songs</label>
<input type="file" id="songUpload" multiple accept="audio/*">
</div>

<div class="buttons">
<button onclick="loadSongs()">load songs</button>
<button onclick="startPractice()">start practice</button>
<button onclick="nextSong()">next song</button>
</div>

<div style="margin-top:14px;font-size:13px;color:var(--secondary)">
<label>
<input type="checkbox" id="showSetlist"> show setlist
</label>
</div>

<div id="loader" class="loader"></div>

<h3 id="sessionTimer">session time left: --:--</h3>

<h2 id="songDisplay">upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<div id="songProgressContainer">
<div id="songProgress"></div>
</div>

<div id="setlist"></div>

</div>

<script src="script.js"></script>

<script>

function toggleDark(){
document.body.classList.toggle("dark")

const btn=document.getElementById("darkToggle")

btn.innerText=document.body.classList.contains("dark") ? "☀️":"🌙"
}

/* start in dark mode */

document.body.classList.add("dark")
document.getElementById("darkToggle").innerText="☀️"

</script>

</body>
</html>
