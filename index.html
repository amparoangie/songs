<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>gig practice trainer</title>

<style>

/* overall page */

body{

font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

background:#f5f5f7;

color:#1d1d1f;

text-align:center;

margin:0;

padding:40px;

text-transform: lowercase;

}


/* main container */

.container{

max-width:500px;

margin:auto;

}


/* title */

h1{

font-size:32px;

font-weight:500;

margin-bottom:30px;

}


/* dropdown */

select{

font-family:inherit;

padding:10px 14px;

border-radius:10px;

border:1px solid #d2d2d7;

background:white;

font-size:15px;

margin-top:6px;

}


/* buttons */

button{

font-family:inherit;

background:#ffffff;

border:1px solid #d2d2d7;

border-radius:12px;

padding:10px 18px;

font-size:15px;

cursor:pointer;

margin:6px;

transition:all 0.2s ease;

}


/* button hover */

button:hover{

background:#f2f2f2;

transform:translateY(-1px);

}


/* upload */

input[type="file"]{

font-family:inherit;

margin-top:12px;

}


/* song display */

#songDisplay{

font-size:30px;

margin-top:25px;

font-weight:500;

}


/* countdown */

#countdown{

font-size:64px;

color:#ff3b30;

margin-top:10px;

}


/* session timer */

#sessionTimer{

font-size:18px;

color:#6e6e73;

margin-top:12px;

}


/* audio player */

audio{

margin-top:20px;

}

</style>

</head>



<body>

<div class="container">

<h1>gig practice trainer</h1>


<label>practice time</label>

<br>

<select id="timeSelect">

<option value="60">1 hour</option>
<option value="120">2 hours</option>
<option value="180">3 hours</option>

</select>


<br><br>


<input type="file" id="songUpload" multiple accept="audio/*">


<br><br>


<button onclick="loadSongs()">load songs</button>

<button onclick="startPractice()">start practice</button>


<h3 id="sessionTimer">session time left: --:--</h3>


<h2 id="songDisplay">upload songs to begin</h2>


<div id="countdown"></div>


<audio id="audioPlayer" controls></audio>


<br><br>


<button onclick="nextSong()">next song</button>


</div>


<script src="script.js"></script>

</body>

</html>
