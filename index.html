<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>amparo</title>

<style>

/* --------- APPLE SYSTEM FONT --------- */

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
background:#111;
color:#f5f5f7;
text-align:center;
margin:40px;
}

/* --------- CARD LAYOUT --------- */

.container{
max-width:500px;
margin:auto;
background:#1c1c1e;
padding:30px;
border-radius:14px;
}

/* --------- INPUTS --------- */

select,input{
padding:6px 10px;
border-radius:8px;
border:1px solid #333;
background:#2c2c2e;
color:white;
margin-top:6px;
}

/* --------- BUTTONS --------- */

button{
padding:6px 14px;
border-radius:10px;
border:1px solid #3a3a3c;
background:#2c2c2e;
color:white;
cursor:pointer;
margin:4px;
}

button:hover{
background:#3a3a3c;
}

/* --------- SONG DISPLAY --------- */

#songDisplay{
font-size:28px;
margin-top:20px;
}

#countdown{
font-size:50px;
color:#ff453a;
margin-top:10px;
}

#sessionTimer{
margin-top:10px;
}

/* --------- LOADER --------- */

.loader{
border:4px solid #333;
border-top:4px solid white;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* --------- PROGRESS BAR --------- */

progress{
width:100%;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>amparo</h1>

<label>practice time</label>
<br>
<select id="timeSelect">
<option value="60">1 hour</option>
<option value="120">2 hours</option>
<option value="180">3 hours</option>
</select>

<br><br>

<label>countdown</label>
<br>
<select id="countdownSelect">
<option value="3">3 seconds</option>
<option value="5">5 seconds</option>
<option value="10">10 seconds</option>
</select>

<br><br>

<input type="file" id="songUpload" multiple accept="audio/*">

<br><br>

<button onclick="loadSongs()">load songs</button>
<button onclick="startPractice()">start practice</button>
<button onclick="nextSong()">next song</button>

<br><br>

<label>
<input type="checkbox" id="showSetlist">
show setlist
</label>

<div id="loader" class="loader"></div>

<h3 id="sessionTimer">session time left: --:--</h3>

<h2 id="songDisplay">upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<progress id="songProgress" value="0" max="100"></progress>

<ul id="setlist"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
