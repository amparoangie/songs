<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>amparo</title>

<link rel="icon" href="favicon.ico">

<style>

/* ---------- BASE ---------- */

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
background:#111;
color:#f5f5f7;
text-align:center;
margin:40px;
transition:.25s;
}

/* LIGHT MODE */

body.light{
background:#f5f5f7;
color:#111;
}

/* CONTAINER */

.container{
max-width:520px;
margin:auto;
background:#1c1c1e;
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

body.light .container{
background:white;
}

/* DARK MODE BUTTON */

#darkToggle{
position:absolute;
top:20px;
left:20px;
font-size:18px;
padding:6px 10px;
border-radius:8px;
border:none;
cursor:pointer;
background:#2c2c2e;
color:white;
}

body.light #darkToggle{
background:#ddd;
color:black;
}

/* GROUP SPACING */

.control-group{
margin-bottom:24px;
}

/* INPUTS */

select,input{
padding:7px 12px;
border-radius:8px;
border:1px solid #333;
background:#2c2c2e;
color:white;
margin-top:6px;
}

body.light select,
body.light input{
background:white;
color:black;
border:1px solid #ccc;
}

/* BUTTONS */

button{
padding:7px 16px;
border-radius:10px;
border:1px solid #3a3a3c;
background:#2c2c2e;
color:white;
cursor:pointer;
margin:4px;
}

button:hover{
background:#3a3a3c;
}

body.light button{
background:#eee;
color:black;
border:1px solid #ccc;
}

/* START BUTTON */

.startButton{
background:#ff453a;
border:none;
color:white;
}

/* SONG DISPLAY */

#songDisplay{
font-size:28px;
margin-top:30px;
}

/* COUNTDOWN */

#countdown{
font-size:60px;
color:#ff453a;
margin-top:14px;
margin-bottom:28px;
}

/* SESSION TIMER */

#sessionTimer{
margin-top:12px;
margin-bottom:24px;
}

/* AUDIO PLAYER */

audio{
margin-top:24px;
}

/* SONG PROGRESS */

progress{
width:100%;
margin-top:16px;
accent-color:#ff453a;
}

/* LOADER */

.loader{
border:4px solid #333;
border-top:4px solid #ff453a;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
display:none;
margin-top:12px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* SETLIST */

#setlist{
margin-top:20px;
list-style:none;
padding:0;
font-size:14px;
}

#setlist li{
padding:4px 0;
}

</style>

</head>

<body>

<button id="darkToggle">🌙</button>

<div class="container">

<h1>amparo</h1>

<div class="control-group">
<label>practice time</label><br>

<select id="timeSelect">
<option value="60">1 hour</option>
<option value="120">2 hours</option>
<option value="180">3 hours</option>
</select>
</div>

<div class="control-group">
<label>countdown</label><br>

<select id="countdownSelect">
<option value="3">3 seconds</option>
<option value="5">5 seconds</option>
<option value="10">10 seconds</option>
</select>
</div>

<div class="control-group">
<input type="file" id="songUpload" multiple accept="audio/*">
</div>

<div class="control-group">

<button onclick="loadSongs()">load songs</button>

<button class="startButton" onclick="startPractice()">start practice</button>

<button onclick="nextSong()">next song</button>

</div>

<label>
<input type="checkbox" id="showSetlist">
show setlist
</label>

<div id="loader" class="loader"></div>

<h3 id="sessionTimer">session time left: --:--</h3>

<h2 id="songDisplay">upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<progress id="songProgress" value="0" max="100"></progress>

<ul id="setlist"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
