<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amparo</title>

<link rel="icon" href="favicon.ico">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
background:#ffffff;
color:#111;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
margin:0;
}

.dark{
background:#121212;
color:#eee;
}

.container{
text-align:center;
width:420px;
}

h1{
font-weight:500;
margin-bottom:40px;
}

.controls{
display:flex;
flex-direction:column;
gap:20px;
align-items:center;
}

.row{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
}

button, select, input[type=file]{
padding:8px 14px;
border-radius:8px;
border:1px solid #ddd;
background:white;
font-size:14px;
}

.dark button,
.dark select,
.dark input[type=file]{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

button:hover{
cursor:pointer;
opacity:.9;
}

.start{
background:#e63946;
color:white;
border:none;
}

.dark .start{
background:#e63946;
}

audio{
margin-top:20px;
width:100%;
}

.countdown{
font-size:28px;
margin-top:10px;
}

.songtitle{
margin-top:12px;
font-size:18px;
}

.setlist{
margin-top:20px;
font-size:14px;
display:none;
}

.toggle{
position:absolute;
top:18px;
left:18px;
font-size:20px;
cursor:pointer;
}

.spinner{
border:3px solid #eee;
border-top:3px solid #999;
border-radius:50%;
width:20px;
height:20px;
animation:spin 1s linear infinite;
display:none;
margin-left:8px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body class="dark">

<div class="toggle" onclick="toggleDark()">🌙</div>

<div class="container">

<h1>amparo</h1>

<div class="controls">

<div class="row">
<select id="countdownSelect">
<option value="3">3 second countdown</option>
<option value="5">5 second countdown</option>
<option value="10">10 second countdown</option>
</select>
</div>

<div class="row">
<input type="file" id="songUpload" multiple accept="audio/*">
<div id="spinner" class="spinner"></div>
</div>

<div class="row">
<button class="start" onclick="startSession()">start session</button>
</div>

<div class="row">
<label>
<input type="checkbox" id="showSetlist">
show setlist
</label>
</div>

</div>

<div class="songtitle" id="songTitle"></div>
<div class="countdown" id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<div class="setlist" id="setlist"></div>

</div>

<script>

let songs=[]
let remainingSongs=[]
let sessionStarted=false

const upload=document.getElementById("songUpload")
const spinner=document.getElementById("spinner")

upload.addEventListener("change",()=>{
spinner.style.display="inline-block"

setTimeout(()=>{
songs=[...upload.files]
remainingSongs=[...songs]
spinner.style.display="none"
},500)
})

function startSession(){

if(songs.length===0){
alert("upload songs first")
return
}

sessionStarted=true

remainingSongs=[...songs]

if(document.getElementById("showSetlist").checked){
displaySetlist()
}

nextSong()
}

function nextSong(){

if(remainingSongs.length===0){
remainingSongs=[...songs]
}

const index=Math.floor(Math.random()*remainingSongs.length)
const song=remainingSongs.splice(index,1)[0]

document.getElementById("songTitle").textContent=song.name

let countdown=parseInt(document.getElementById("countdownSelect").value)
const countdownEl=document.getElementById("countdown")

countdownEl.textContent=countdown

let timer=setInterval(()=>{

countdown--

if(countdown<=0){
clearInterval(timer)
countdownEl.textContent=""

playSong(song)
}else{
countdownEl.textContent=countdown
}

},1000)

}

function playSong(song){

const player=document.getElementById("audioPlayer")
player.src=URL.createObjectURL(song)
player.play()

player.onended=()=>{
nextSong()
}

}

function displaySetlist(){

const list=document.getElementById("setlist")
list.style.display="block"

list.innerHTML="<b>setlist</b><br><br>"

songs.forEach(song=>{
list.innerHTML+=song.name+"<br>"
})

}

function toggleDark(){

const body=document.body
const toggle=document.querySelector(".toggle")

body.classList.toggle("dark")

if(body.classList.contains("dark")){
toggle.textContent="🌙"
}else{
toggle.textContent="☀️"
}

}

</script>

</body>
</html>
