<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Gig Practice Trainer</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
margin:40px;
}

#songDisplay{
font-size:28px;
margin-top:20px;
}

#countdown{
font-size:60px;
color:darkred;
margin-top:10px;
}

#sessionTimer{
font-size:22px;
margin-top:10px;
}

audio{
margin-top:20px;
}

</style>

</head>

<body>

<h1>Gig Practice Trainer</h1>

<label>Practice Time</label>

<select id="timeSelect">
<option value="60">1 Hour</option>
<option value="120">2 Hours</option>
<option value="180">3 Hours</option>
</select>

<br><br>

<input type="file" id="songUpload" multiple accept="audio/*">

<br><br>

<button onclick="loadSongs()">Load Songs</button>
<button onclick="startPractice()">Start Practice</button>

<h3 id="sessionTimer">Session Time Left: --:--</h3>

<h2 id="songDisplay">Upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<br><br>

<button onclick="nextSong()">Next Song</button>

<script src="script.js"></script>

</body>
</html>
