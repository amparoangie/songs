<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>session</title>

<style>

/* ==========================
   COLORS
========================== */

/* LIGHT MODE COLORS */
:root {
  --bg: #f5f5f7;
  --text: #1d1d1f;
  --secondary: #6e6e73;
  --button: #ffffff;
  --border: #d2d2d7;
  --accent: #ff3b30;
}

/* DARK MODE COLORS */
body.dark {
  --bg: #1c1c1e;
  --text: #f5f5f7;
  --secondary: #a1a1a6;
  --button: #2c2c2e;
  --border: #3a3a3c;
  --accent: #ff453a;
}

/* ==========================
   FONT SETTINGS
========================== */
:root {
  --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-size-title: 32px;
  --font-size-label: 16px;
  --font-size-text: 14px;
  --font-size-song: 28px;
  --font-size-countdown: 64px;
  --font-size-session: 18px;
  --text-transform: lowercase;
}

/* ==========================
   PAGE LAYOUT
========================== */
body {
  font-family: var(--font-family);
  background: var(--bg);
  color: var(--text);
  text-align: center;
  margin: 5;
  padding: 40px;
  text-transform: var(--text-transform);
  transition: background .3s, color .3s;
}

/* CONTAINER */
.container {
  max-width: 520px;
  margin: auto;
}

/* ==========================
   DARK MODE BUTTON
========================== */
#darkModeToggle {
  position: fixed;
  top: 15px;
  left: 15px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--button);
  cursor: pointer;
  transition: all .2s;
  z-index: 1000;
}
#darkModeToggle:hover {
  background: #f2f2f2;
  transform: translateY(-1px);
}

/* ==========================
   TITLES & LABELS
========================== */
h1 {
  font-size: var(--font-size-title);
  font-weight: 500;
  margin-bottom: 25px;
}

label {
  display: block;
  font-size: var(--font-size-label);
  margin-bottom: 12px; /* spacing between label and input/select */
}

/* ==========================
   SELECT & INPUTS
========================== */
select, input[type="file"] {
  font-family: inherit;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--button);
  color: var(--text);
  font-size: var(--font-size-text);
  margin-bottom: 15px; /* spacing between input fields */
}

/* ==========================
   BUTTONS
========================== */
button {
  font-family: inherit;
  background: var(--button);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 18px;
  font-size: var(--font-size-text);
  cursor: pointer;
  margin: 6px;
  color: var(--text);
  transition: all .2s;
}
button:hover {
  transform: translateY(-1px);
}

/* ==========================
   SONG DISPLAY
========================== */
#songDisplay {
  font-size: var(--font-size-song);
  margin-top: 20px;
  font-weight: 500;
}

/* COUNTDOWN */
#countdown {
  font-size: var(--font-size-countdown);
  color: var(--accent);
  margin-top: 10px;
}

/* SESSION TIMER */
#sessionTimer {
  font-size: var(--font-size-session);
  color: var(--secondary);
  margin-top: 10px;
}

/* ==========================
   SETLIST BOX
========================== */
#setlist {
  margin-top: 20px;
  text-align: left;
  font-size: var(--font-size-text);
  max-height: 200px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  background: var(--button);
  display: none;
}

/* ==========================
   AUDIO & PROGRESS
========================== */
audio {
  margin-top: 20px;
  width: 100%;
}

/* SONG PROGRESS BAR */
#songProgressContainer {
  width: 100%;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin-top: 10px;
  overflow: hidden;
  cursor: pointer;
}
#songProgress {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.1s linear;
}

/* SONG LOADING PROGRESS BAR */
#loadProgressContainer {
  width: 100%;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin-top: 10px;
  overflow: hidden;
}
#loadProgress {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.2s;
}

/* CHECKBOX ROW */
.optionRow {
  margin-top: 10px;
  font-size: var(--font-size-text);
  color: var(--secondary);
}

</style>
</head>

<body>

<!-- Dark mode toggle fixed top-left -->
<button id="darkModeToggle" onclick="toggleDarkMode()">🌙</button>

<div class="container">

<h1>session</h1>

<label class="spacedLabel">practice time</label>
<select id="timeSelect">
<option value="60">1 hour</option>
<option value="120">2 hours</option>
<option value="180">3 hours</option>
</select>

<input type="file" id="songUpload" multiple accept="audio/*">

<button onclick="loadSongs()">load songs</button>
<button onclick="startPractice()">start practice</button>

<div class="optionRow">
<label>
<input type="checkbox" id="showSetlist">
show generated setlist
</label>
</div>

<h3 id="sessionTimer">session time left: --:--</h3>

<h2 id="songDisplay">upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<div id="songProgressContainer">
  <div id="songProgress"></div>
</div>

<div id="loadProgressContainer">
  <div id="loadProgress"></div>
</div>

<button onclick="nextSong()">next song</button>

<div id="setlist"></div>

</div>

<script src="script.js"></script>

<script>
// Dark mode toggle with emoji
function toggleDarkMode() {
  const btn = document.getElementById("darkModeToggle");
  document.body.classList.toggle("dark");
  btn.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
</script>

</body>
</html>
