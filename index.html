<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>gig practice trainer</title>

<style>

/* LIGHT MODE COLORS */

:root{
--bg:#f5f5f7;
--text:#1d1d1f;
--secondary:#6e6e73;
--button:#ffffff;
--border:#d2d2d7;
--accent:#ff3b30;
}

/* DARK MODE COLORS */

body.dark{
--bg:#1c1c1e;
--text:#f5f5f7;
--secondary:#a1a1a6;
--button:#2c2c2e;
--border:#3a3a3c;
--accent:#ff453a;
}


/* PAGE */

body{
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
background:var(--bg);
color:var(--text);
text-align:center;
margin:0;
padding:40px;
text-transform:lowercase;
transition:background .3s,color .3s;
}


/* CONTAINER */

.container{
max-width:520px;
margin:auto;
}


/* TITLE */

h1{
font-size:32px;
font-weight:500;
margin-bottom:25px;
}


/* DROPDOWN */

select{
font-family:inherit;
padding:10px 14px;
border-radius:10px;
border:1px solid var(--border);
background:var(--button);
color:var(--text);
font-size:15px;
}


/* BUTTONS */

button{
font-family:inherit;
background:var(--button);
border:1px solid var(--border);
border-radius:12px;
padding:10px 18px;
font-size:15px;
cursor:pointer;
margin:6px;
color:var(--text);
transition:all .2s;
}

button:hover{
transform:translateY(-1px);
}


/* SONG DISPLAY */

#songDisplay{
font-size:25px;
margin-top:20px;
font-weight:500;
}


/* COUNTDOWN */

#countdown{
font-size:64px;
color:var(--accent);
margin-top:10px;
}


/* TIMER */

#sessionTimer{
font-size:18px;
color:var(--secondary);
margin-top:10px;
}


/* SETLIST BOX */

#setlist{
margin-top:20px;
text-align:left;
font-size:14px;
max-height:200px;
overflow:auto;
border:1px solid var(--border);
border-radius:10px;
padding:10px;
background:var(--button);
display:none;
}


/* AUDIO */

audio{
margin-top:20px;
}


/* CHECKBOX ROW */

.optionRow{
margin-top:10px;
font-size:14px;
color:var(--secondary);
}

</style>

</head>


<body>

<div class="container">

<h1>gig practice trainer</h1>

<button onclick="toggleDarkMode()">toggle dark mode</button>

<br><br>

<label>practice time</label><br>

<select id="timeSelect">
<option value="60">1 hour</option>
<option value="120">2 hours</option>
<option value="180">3 hours</option>
</select>

<br><br>

<input type="file" id="songUpload" multiple accept="audio/*">

<br><br>

<button onclick="loadSongs()">load songs</button>
<button onclick="startPractice()">start practice</button>

<div class="optionRow">
<label>
<input type="checkbox" id="showSetlist">
show generated setlist
</label>
</div>

<h3 id="sessionTimer">session time left: --:--</h3>

<h2 id="songDisplay">upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<br><br>

<button onclick="nextSong()">next song</button>

<div id="setlist"></div>

</div>

<script src="script.js"></script>

<script>

/* DARK MODE */

function toggleDarkMode(){
document.body.classList.toggle("dark")
}

</script>

</body>
</html>
