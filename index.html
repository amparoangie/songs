<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>practice</title>

<link rel="icon" href="favicon.ico">

<style>

/* ---------- APPLE STYLE FONT ---------- */

body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
background:#111;
color:#f5f5f7;
text-align:center;
margin:40px;
}

/* ---------- MAIN CONTAINER ---------- */

.container{
max-width:520px;
margin:auto;
background:#1c1c1e;
padding:40px;
border-radius:16px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

/* ---------- INPUT GROUP SPACING ---------- */

.control-group{
margin-bottom:22px;
}

/* ---------- INPUTS ---------- */

select,input{
padding:7px 12px;
border-radius:8px;
border:1px solid #333;
background:#2c2c2e;
color:white;
margin-top:6px;
}

/* ---------- BUTTONS ---------- */

button{
padding:6px 16px;
border-radius:10px;
border:1px solid #3a3a3c;
background:#2c2c2e;
color:white;
cursor:pointer;
margin:4px;
font-size:14px;
}

button:hover{
background:#3a3a3c;
}

/* ---------- SONG DISPLAY ---------- */

#songDisplay{
font-size:28px;
margin-top:30px;
}

#countdown{
font-size:55px;
color:#ff453a;
margin-top:14px;
margin-bottom:20px;
}

/* ---------- SESSION TIMER ---------- */

#sessionTimer{
margin-top:10px;
margin-bottom:20px;
}

/* ---------- AUDIO PLAYER ---------- */

audio{
margin-top:18px;
}

/* ---------- PROGRESS BAR ---------- */

progress{
width:100%;
margin-top:14px;
}

/* ---------- LOADING SPINNER ---------- */

.loader{
border:4px solid #333;
border-top:4px solid white;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
display:none;
margin-top:12px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* ---------- SETLIST ---------- */

#setlist{
margin-top:20px;
list-style:none;
padding:0;
font-size:14px;
}

#setlist li{
padding:4px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>practice</h1>

<div class="control-group">

<label>session time</label><br>

<select id="timeSelect">
<option value="60">1 hour</option>
<option value="120">2 hours</option>
<option value="180">3 hours</option>
</select>

</div>

<div class="control-group">

<label>countdown</label><br>

<select id="countdownSelect">
<option value="3">3 seconds</option>
<option value="5">5 seconds</option>
<option value="10">10 seconds</option>
</select>

</div>

<div class="control-group">

<input type="file" id="songUpload" multiple accept="audio/*">

</div>

<div class="control-group">

<button onclick="loadSongs()">load songs</button>
<button onclick="restoreSongs()">restore songs</button>
<button onclick="startPractice()">start practice</button>
<button onclick="nextSong()">next song</button>

</div>

<label>
<input type="checkbox" id="showSetlist">
show setlist
</label>

<div id="loader" class="loader"></div>

<h3 id="sessionTimer">session time left: --:--</h3>

<h2 id="songDisplay">upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<progress id="songProgress" value="0" max="100"></progress>

<ul id="setlist"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
