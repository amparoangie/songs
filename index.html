<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Amparo</title>

<style>
/* ==========================
   COLORS
========================== */
:root {
  --bg: #f5f5f7;
  --text: #1d1d1f;
  --secondary: #6e6e73;
  --button: #ffffff;
  --border: #d2d2d7;
  --accent: #ff3b30;
}

/* DARK MODE COLORS */
body.dark {
  --bg: #1c1c1e;
  --text: #f5f5f7;
  --secondary: #a1a1a6;
  --button: #2c2c2e;
  --border: #3a3a3c;
  --accent: #ff453a;
}

/* ==========================
   FONT SETTINGS
========================== */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
  margin: 0;
  padding: 40px;
  transition: background .3s, color .3s;
}

h1, h2, h3 {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-weight: 500;
  margin: 0;
}

/* ==========================
   PAGE LAYOUT
========================== */
.container {
  max-width: 520px;
  margin: auto;
}

/* ==========================
   DARK MODE BUTTON
========================== */
#darkModeToggle {
  position: fixed;
  top: 15px;
  left: 15px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--button);
  cursor: pointer;
  transition: all .2s;
  z-index: 1000;
}
#darkModeToggle:hover {
  background: #f2f2f2;
  transform: translateY(-1px);
}

/* ==========================
   LABELS & SELECT
========================== */
label {
  display: block;
  font-size: 16px;
  margin-bottom: 12px;
}

select, input[type="file"] {
  font-family: inherit;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--button);
  color: var(--text);
  font-size: 14px;
  margin-bottom: 15px;
}

/* ==========================
   BUTTONS
========================== */
button {
  font-family: inherit;
  background: var(--button);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 14px;
  cursor: pointer;
  margin: 6px;
  color: var(--text);
  transition: all .2s;
}
button:hover {
  transform: translateY(-1px);
}

/* ==========================
   SONG DISPLAY
========================== */
#songDisplay {
  font-size: 28px;
  margin-top: 20px;
  font-weight: 500;
}

/* COUNTDOWN */
#countdown {
  font-size: 64px;
  color: var(--accent);
  margin-top: 10px;
}

/* SESSION TIMER */
#sessionTimer {
  font-size: 18px;
  color: var(--secondary);
  margin-top: 10px;
}

/* ==========================
   SETLIST BOX
========================== */
#setlist {
  margin-top: 20px;
  text-align: left;
  font-size: 14px;
  max-height: 200px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  background: var(--button);
  display: none;
}

/* ==========================
   AUDIO & PROGRESS
========================== */
audio {
  margin-top: 20px;
  width: 100%;
}
#songProgressContainer {
  width: 100%;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin-top: 10px;
  overflow: hidden;
  cursor: pointer;
}
#songProgress {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width 0.1s linear;
}

/* ==========================
   CHECKBOX ROW
========================== */
.optionRow {
  margin-top: 10px;
  font-size: 14px;
  color: var(--secondary);
}

/* ==========================
   CIRCULAR LOADER
========================== */
.loader {
  border: 6px solid var(--border);
  border-top: 6px solid var(--accent);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  margin: 20px auto;
  animation: spin 1s linear infinite;
  display: none;
}
@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}

</style>
</head>

<body>

<button id="darkModeToggle" onclick="toggleDarkMode()">🌙</button>

<div class="container">

<h1>Amparo</h1>

<label>Practice Time</label>
<select id="timeSelect">
<option value="60">1 Hour</option>
<option value="120">2 Hours</option>
<option value="180">3 Hours</option>
</select>

<input type="file" id="songUpload" multiple accept="audio/*">

<button onclick="loadSongs()">Load Songs</button>
<button onclick="startPractice()">Start Practice</button>

<div class="optionRow">
<label>
<input type="checkbox" id="showSetlist"> Show Generated Setlist
</label>
</div>

<h3 id="sessionTimer">Session Time Left: --:--</h3>

<h2 id="songDisplay">Upload songs to begin</h2>

<div id="countdown"></div>

<audio id="audioPlayer" controls></audio>

<div id="songProgressContainer">
  <div id="songProgress"></div>
</div>

<div id="loader" class="loader"></div>

<button onclick="nextSong()">Next Song</button>

<div id="setlist"></div>

</div>

<script src="script.js"></script>

<script>
// Dark mode toggle with emoji
function toggleDarkMode() {
  const btn = document.getElementById("darkModeToggle");
  document.body.classList.toggle("dark");
  btn.innerText = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
</script>

</body>
</html>
